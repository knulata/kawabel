<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kawabel — Teman Belajar AI-mu">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4CAF50">

  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kawabel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Google Sign-In client ID (replace with your own from Google Cloud Console) -->
  <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kawabel</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen while Flutter loads */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #81C784 0%, #4CAF50 50%, #388E3C 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      /* Prevent pull-to-refresh in PWA */
      overscroll-behavior: none;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-owl {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      animation: splash-bounce 2s ease-in-out infinite;
    }

    .splash-title {
      margin-top: 20px;
      font-size: 36px;
      font-weight: 900;
      color: white;
      letter-spacing: 1.5px;
    }

    .splash-subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
    }

    .splash-loader {
      margin-top: 32px;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: splash-spin 0.8s linear infinite;
    }

    @keyframes splash-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }

    /* Prevent overscroll bounce on iOS */
    html {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Branded splash screen shown while Flutter initializes -->
  <div id="splash">
    <div class="splash-owl">🦉</div>
    <div class="splash-title">kawabel</div>
    <div class="splash-subtitle">kawan belajar</div>
    <div class="splash-loader"></div>
  </div>

  <script>
    // Remove splash once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function() { splash.remove(); }, 400);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
