name: kawabel
description: "Kawabel (Kawan Belajar) — AI Study Buddy for Indonesian students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  animate_do: ^3.3.4
  flutter_markdown: ^0.7.7+1
  mime: ^2.0.0
  speech_to_text: ^7.0.0
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
